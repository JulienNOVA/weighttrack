<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeightTrack</title>

<!-- ✅ CORRECTION IMPORTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
<script src="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"></script>


<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0B1220;color:white}
.container{max-width:500px;margin:auto;padding:20px}
h1{color:#FF9F0A}

.card{background:#111827;padding:18px;border-radius:18px;margin-bottom:14px;box-shadow:0 10px 25px rgba(0,0,0,0.3)}

.field{display:flex;flex-direction:column;margin-top:12px}
.label{font-size:12px;color:#9CA3AF;margin-bottom:6px;opacity:0.8}

input,select{
 width:100%;height:48px;padding:0 14px;border-radius:14px;
 border:1px solid transparent;background:linear-gradient(180deg,#1C2433,#18202E);
 color:white;font-size:15px;box-sizing:border-box
}

input:focus,select:focus{border:1px solid #FF9F0A;box-shadow:0 0 0 2px rgba(255,159,10,0.25)}

select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='10' viewBox='0 0 24 24' width='10'><path d='M7 10l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 12px center}

option{background:#1C2433;color:white}

button{padding:12px;border:none;border-radius:14px;margin-top:14px}
.primary{background:#FF9F0A;color:black;width:100%}

.history-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}

/* ✅ Légende */
.legend-item{display:flex;align-items:center;gap:10px;padding:6px 0}
.legend-color{width:14px;height:14px;border-radius:4px}

.maigreur{background:#ff4d4d;}
.normal{background:#32D74B;}
.surpoids{background:#FFD60A;}
.ob1{background:#FF9F0A;}
.ob2{background:#ff3b30;}
.ob3{background:#ff0000;}
</style>
</head>

<body>
<div class="container">
<h1>WeightTrack</h1>

<div class="card">
<h3>Profil</h3>
<div class="field"><div class="label">Nom</div><input id="name"></div>
<div class="field"><div class="label">Sexe</div><select id="sex"><option>Homme</option><option>Femme</option></select></div>
<div class="field"><div class="label">Age</div><input id="age" type="number"></div>
<div class="field"><div class="label">Taille (cm)</div><input id="height"></div>
<div class="field"><div class="label">Morphologie</div>
<select id="morpho">
<option value="normal">Normal</option>
<option value="mince">Mince</option>
<option value="large">Large</option>
</select>
</div>
</div>

<!-- OBJECTIF -->
<div class="card">
<h3>Objectif</h3>
<div class="history-item"><span>Poids idéal</span><span id="idealWeight">-</span></div>
<div class="history-item"><span>Plage IMC normal</span><span id="bmiRange">-</span></div>
</div>

<div class="card">
<h3>Ajouter</h3>
<div class="field"><div class="label">Date</div><input type="date" id="date"></div>
<div class="field"><div class="label">Poids (kg)</div><input id="weight"></div>
<button class="primary" onclick="addEntry()">Ajouter</button>
</div>

<div class="card">
<h3>Période</h3>
<select id="period" onchange="updateCharts()">
<option value="10">10 jours</option>
<option value="30">30 jours</option>
<option value="90">90 jours</option>
<option value="all" selected>Tout</option>
</select>
</div>

<div class="card"><h3>Poids</h3><canvas id="chartWeight"></canvas></div>
<div class="card"><h3>IMC</h3><canvas id="chartBMI"></canvas></div>

<!-- ✅ LEGENDE -->
<div class="card">
<h3>Légende IMC</h3>
<div class="legend-item"><div class="legend-color maigreur"></div>15 - 18.5 : Maigreur</div>
<div class="legend-item"><div class="legend-color normal"></div>18.5 - 25 : Normal</div>
<div class="legend-item"><div class="legend-color surpoids"></div>25 - 30 : Surpoids</div>
<div class="legend-item"><div class="legend-color ob1"></div>30 - 35 : Obésité 1</div>
<div class="legend-item"><div class="legend-color ob2"></div>35 - 40 : Obésité 2</div>
<div class="legend-item"><div class="legend-color ob3"></div>40 - 42.5 : Obésité 3</div>
</div>

<div class="card"><h3>Historique</h3><div id="history"></div></div>

</div>

<script>
let entries=[];
let chartWeight, chartBMI;

const dateEl=document.getElementById("date");
const weightEl=document.getElementById("weight");
const heightEl=document.getElementById("height");
const ageEl=document.getElementById("age");
const morphoEl=document.getElementById("morpho");
const historyEl=document.getElementById("history");

const idealWeightEl=document.getElementById("idealWeight");
const bmiRangeEl=document.getElementById("bmiRange");

window.onload=()=>{
 dateEl.value=new Date().toISOString().split("T")[0];
 updateObjective();
}

function bmi(w,h){return (w/((h/100)**2)).toFixed(1)}

function creff(){
 const h=parseFloat(heightEl.value);
 const a=parseFloat(ageEl.value);
 if(isNaN(h)||isNaN(a)) return null;
 let base=(h-100+a/10)*0.9;
 if(morphoEl.value==="mince") base*=0.9;
 if(morphoEl.value==="large") base*=1.1;
 return parseFloat(base.toFixed(1));
}

function updateObjective(){
 const h=parseFloat(heightEl.value);
 if(isNaN(h)){idealWeightEl.innerText="-";bmiRangeEl.innerText="-";return;}

 const ideal=creff();
 idealWeightEl.innerText=ideal ? ideal+" kg":"-";

 const min=(18.5*((h/100)**2)).toFixed(1);
 const max=(25*((h/100)**2)).toFixed(1);
 bmiRangeEl.innerText=`${min} - ${max} kg`;
}

[heightEl,ageEl,morphoEl].forEach(el=>el.addEventListener("input",updateObjective));

function addEntry(){
 const w=parseFloat(weightEl.value);
 const h=parseFloat(heightEl.value);
 if(isNaN(w)||isNaN(h)) return alert("Remplis poids + taille");
 entries.push({date:dateEl.value,weight:w,bmi:parseFloat(bmi(w,h))});
 updateCharts();updateHistory();
}

function updateHistory(){
 historyEl.innerHTML=entries.slice().reverse().map(e=>
 `<div class="history-item"><span>${e.date}</span><span>${e.weight} kg | IMC ${e.bmi}</span></div>`).join("");
}

function prepareData(){
 const sorted=[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date));
 if(!sorted.length) return {dates:[],weights:[],bmiData:[],ideals:[]};

 let dates=[],weights=[],bmiData=[],ideals=[];
 let cur=new Date(sorted[0].date);
 let end=new Date();

 while(cur<=end){
  let d=cur.toISOString().split("T")[0];
  dates.push(d);

  let day=sorted.filter(e=>e.date===d);
  if(day.length){
   weights.push(day.reduce((a,b)=>a+b.weight,0)/day.length);
   bmiData.push(day.reduce((a,b)=>a+b.bmi,0)/day.length);
  } else {weights.push(null);bmiData.push(null);}

  ideals.push(creff());
  cur.setDate(cur.getDate()+1);
 }

 return {dates,weights,bmiData,ideals};
}

function updateCharts(){
 const {dates,weights,bmiData,ideals}=prepareData();
 if(!dates.length) return;

 if(chartWeight) chartWeight.destroy();
 if(chartBMI) chartBMI.destroy();

 chartWeight=new Chart(document.getElementById("chartWeight"),{
  type:'line',
  data:{labels:dates,datasets:[
   {label:'Poids',data:weights,borderColor:'#FF9F0A',spanGaps:true},
   {label:'Poids idéal',data:ideals,borderColor:'white',borderDash:[5,5]}
  ]}
 });

 chartBMI=new Chart(document.getElementById("chartBMI"),{
  type:'line',
  data:{labels:dates,datasets:[{label:'IMC',data:bmiData,borderColor:'#32D74B',spanGaps:true}]},
  options:{
   plugins:{
    annotation:{annotations:{
     maigreur:{type:'box',yMin:15,yMax:18.5,backgroundColor:'rgba(255,77,77,0.15)'},
     normal:{type:'box',yMin:18.5,yMax:25,backgroundColor:'rgba(50,215,75,0.15)'},
     surpoids:{type:'box',yMin:25,yMax:30,backgroundColor:'rgba(255,214,10,0.15)'},
     ob1:{type:'box',yMin:30,yMax:35,backgroundColor:'rgba(255,159,10,0.15)'},
     ob2:{type:'box',yMin:35,yMax:40,backgroundColor:'rgba(255,59,48,0.18)'},
     ob3:{type:'box',yMin:40,yMax:42.5,backgroundColor:'rgba(255,0,0,0.2)'}
    }}
   },
   scales:{y:{min:15,max:42.5}}
  }
 });
}
</script>
</body>
</html>
